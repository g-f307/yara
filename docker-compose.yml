services:
  # ── PostgreSQL ───────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: yara-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: yara
      POSTGRES_PASSWORD: yara_password
      POSTGRES_DB: yara_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yara -d yara_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend FastAPI ──────────────────────────────
  backend:
    build: ./backend
    container_name: yara-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data/qiime2:/app/data/qiime2
      - ./backend/uploads:/app/uploads
    environment:
      - STORAGE_PATH=/app/uploads
      - DATABASE_URL=postgresql://yara:yara_password@yara-postgres:5432/yara_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Next.js ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: yara-frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    environment:
      - PYTHON_CORE_URL=http://backend:8000
      - DATABASE_URL=postgresql://yara:yara_password@yara-postgres:5432/yara_db?schema=public
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
